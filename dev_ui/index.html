<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookAI Dev UI</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, sans-serif;
    font-size: 14px;
    background: #f0f2f5;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  #header {
    background: #1a1a2e;
    color: #fff;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  #header label { font-size: 12px; color: #aaa; }
  #header input {
    padding: 5px 8px;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    background: #2d2d44;
    color: #fff;
    width: 240px;
  }
  #inp-property { width: 60px !important; }
  #btn-connect {
    padding: 6px 14px;
    background: #4f46e5;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
  }
  #btn-connect:hover { background: #4338ca; }
  #status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #6b7280;
    flex-shrink: 0;
  }
  #status-dot.connected { background: #22c55e; }
  #status-text { font-size: 12px; color: #aaa; }

  /* ── Main ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Left panel ── */
  #panel-left {
    width: 300px;
    flex-shrink: 0;
    background: #fff;
    border-right: 1px solid #e5e7eb;
    display: flex;
    flex-direction: column;
  }
  #search-area {
    padding: 10px;
    border-bottom: 1px solid #e5e7eb;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  #inp-search {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 13px;
  }
  #sel-status {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 13px;
    background: #fff;
  }
  #conv-list {
    flex: 1;
    overflow-y: auto;
  }
  .conv-item {
    padding: 12px 14px;
    border-bottom: 1px solid #f3f4f6;
    cursor: pointer;
    transition: background 0.1s;
  }
  .conv-item:hover { background: #f9fafb; }
  .conv-item.active { background: #eff6ff; border-left: 3px solid #4f46e5; }
  .conv-name {
    font-weight: 600;
    color: #111;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .conv-preview {
    color: #6b7280;
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .conv-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .conv-time {
    font-size: 11px;
    color: #9ca3af;
    flex-shrink: 0;
    margin-left: 8px;
  }

  /* ── Right panel ── */
  #panel-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #f0f2f5;
    overflow: hidden;
  }
  #chat-header {
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
    padding: 12px 16px;
    font-weight: 600;
    color: #111;
    flex-shrink: 0;
    min-height: 48px;
  }
  #chat-header small {
    font-weight: 400;
    color: #6b7280;
    margin-left: 8px;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .msg-row {
    display: flex;
  }
  .msg-row.inbound { justify-content: flex-start; }
  .msg-row.outbound { justify-content: flex-end; }
  .bubble {
    max-width: 65%;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.4;
    word-break: break-word;
  }
  .msg-row.inbound .bubble {
    background: #fff;
    border-bottom-left-radius: 3px;
    color: #111;
  }
  .msg-row.outbound .bubble {
    background: #4f46e5;
    border-bottom-right-radius: 3px;
    color: #fff;
  }
  .msg-row.outbound.system .bubble { background: #7c3aed; }

  /* Email bubbles */
  .msg-row.inbound.email .bubble { background: #f0f9ff; border-left: 3px solid #0ea5e9; }
  .msg-row.outbound.email .bubble { background: #0369a1; }

  /* Internal notes */
  .msg-row.note { justify-content: center; }
  .msg-row.note .bubble {
    background: #fef9c3;
    color: #713f12;
    border: 1px solid #fde047;
    border-radius: 8px;
    font-size: 12px;
    font-style: italic;
    max-width: 85%;
    text-align: center;
  }

  /* Transfer button in chat header */
  #chat-header { display: flex; align-items: center; justify-content: space-between; }
  .btn-transfer {
    padding: 5px 12px;
    background: #f3f4f6;
    color: #374151;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    flex-shrink: 0;
  }
  .btn-transfer:hover { background: #e5e7eb; }
  .btn-ai {
    padding: 5px 12px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-ai.on { background: #dcfce7; border-color: #22c55e; color: #15803d; }
  .btn-ai.off { background: #fee2e2; border-color: #ef4444; color: #991b1b; }
  .btn-ai.na { background: #f3f4f6; color: #9ca3af; cursor: default; }

  /* Media in bubbles */
  .media-block { margin-bottom: 6px; }
  .media-block img { display: block; }
  .media-block audio { display: block; }
  .media-block video { display: block; }
  /* Escalation blocks */
  .escalation-block {
    background: #fef3c7;
    border: 1px solid #f59e0b;
    border-radius: 10px;
    padding: 10px 14px;
    margin: 8px 16px;
    font-size: 12px;
  }
  .escalation-block.resolved { background: #f0fdf4; border-color: #22c55e; opacity: 0.7; }
  .escalation-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .escalation-type {
    font-weight: 700;
    color: #92400e;
    font-size: 13px;
  }
  .escalation-block.resolved .escalation-type { color: #166534; }
  .escalation-status {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 8px;
    font-weight: 600;
  }
  .escalation-status.pending { background: #fde68a; color: #92400e; }
  .escalation-status.resolved { background: #bbf7d0; color: #166534; }
  .escalation-reason { color: #78350f; margin-bottom: 6px; }
  .escalation-block.resolved .escalation-reason { color: #166534; }
  .escalation-messages {
    border-top: 1px solid rgba(0,0,0,0.1);
    margin-top: 6px;
    padding-top: 6px;
  }
  .escalation-msg { font-size: 11px; margin-bottom: 3px; color: #555; }
  .btn-resolve {
    padding: 4px 12px;
    background: #22c55e;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
  }
  .btn-resolve:hover { background: #16a34a; }

  .media-ai-tag {
    font-size: 11px;
    font-style: italic;
    opacity: 0.75;
    margin-bottom: 4px;
    padding: 2px 6px;
    background: rgba(0,0,0,0.05);
    border-radius: 4px;
  }

  /* Transfer modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal-box {
    background: #fff;
    border-radius: 10px;
    padding: 24px;
    width: 380px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  }
  .modal-box h3 { font-size: 16px; font-weight: 700; color: #111; }
  .modal-field label {
    display: block;
    font-size: 12px;
    color: #6b7280;
    margin-bottom: 4px;
  }
  .modal-field select, .modal-field textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    background: #fff;
  }
  .modal-field textarea { resize: none; height: 80px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-secondary {
    padding: 7px 14px;
    background: #f3f4f6;
    color: #374151;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .btn-secondary:hover { background: #e5e7eb; }
  .btn-primary {
    padding: 7px 14px;
    background: #4f46e5;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .btn-primary:hover { background: #4338ca; }
  .btn-primary:disabled { background: #a5b4fc; cursor: default; }

  .bubble-meta {
    font-size: 10px;
    margin-top: 3px;
    opacity: 0.6;
  }
  .msg-row.inbound .bubble-meta { text-align: left; }
  .msg-row.outbound .bubble-meta { text-align: right; }

  .email-subject {
    font-size: 11px;
    font-weight: 600;
    opacity: 0.75;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Composer ── */
  #composer {
    background: #fff;
    border-top: 1px solid #e5e7eb;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
  }
  #channel-bar {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .channel-pill {
    padding: 3px 10px;
    border-radius: 12px;
    border: 1px solid #d1d5db;
    background: #f9fafb;
    color: #374151;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
    white-space: nowrap;
  }
  .channel-pill:hover { background: #f3f4f6; }
  .channel-pill.active-wa {
    background: #dcfce7;
    border-color: #22c55e;
    color: #15803d;
    font-weight: 600;
  }
  .channel-pill.active-email {
    background: #e0f2fe;
    border-color: #0ea5e9;
    color: #0369a1;
    font-weight: 600;
  }
  #inp-subject {
    width: 100%;
    padding: 6px 10px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    display: none;
  }
  #composer-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  #inp-msg {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 13px;
    resize: none;
    height: 40px;
    max-height: 120px;
    font-family: inherit;
  }
  #btn-send {
    padding: 8px 16px;
    background: #4f46e5;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    height: 40px;
    flex-shrink: 0;
  }
  #btn-send:hover { background: #4338ca; }
  #btn-send:disabled { background: #a5b4fc; cursor: default; }

  #placeholder {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #9ca3af;
    font-size: 13px;
  }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <label>Token</label>
  <input id="inp-token" type="text" value="dev-token-demo-2026" placeholder="Bearer token">
  <label>Property</label>
  <input id="inp-property" type="number" value="1" min="0">
  <button id="btn-connect">Conectar</button>
  <div id="status-dot"></div>
  <span id="status-text">Desconectado</span>
  <span style="margin-left:12px;color:#aaa;font-size:12px">Idioma</span>
  <select id="sel-lang" style="padding:5px 8px;border:none;border-radius:4px;font-size:13px;background:#2d2d44;color:#fff">
    <option value="">Original</option>
    <option value="es">Español</option>
    <option value="en">English</option>
    <option value="fr">Français</option>
    <option value="zh">中文</option>
    <option value="de">Deutsch</option>
  </select>
</div>

<!-- Main -->
<div id="main">

  <!-- Left: conversation list -->
  <div id="panel-left">
    <div id="search-area">
      <input id="inp-search" type="text" placeholder="Buscar por nombre o folio…">
      <select id="sel-status">
        <option value="">Todos los estados</option>
        <option value="draft">Draft</option>
        <option value="confirm">Confirm</option>
        <option value="onboard">Onboard</option>
        <option value="done">Done</option>
        <option value="cancel">Cancel</option>
      </select>
    </div>
    <div id="conv-list"></div>
  </div>

  <!-- Right: chat -->
  <div id="panel-right">
    <div id="placeholder">Selecciona una conversación</div>
  </div>

</div>

<!-- Transfer modal -->
<div id="transfer-modal" style="display:none">
  <div class="modal-backdrop">
    <div class="modal-box">
      <h3>↪ Transferir conversación</h3>
      <div class="modal-field">
        <label>Hotel destino</label>
        <select id="sel-transfer-prop"></select>
      </div>
      <div class="modal-field">
        <label>Nota para el destino (requerida)</label>
        <textarea id="inp-transfer-note" placeholder="Describe el motivo del traspaso…"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeTransferModal()">Cancelar</button>
        <button class="btn-primary" id="btn-transfer-confirm" onclick="doTransfer()">Transferir</button>
      </div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let token = ""
let propertyId = 1
let sio = null
let conversations = []        // [{id, contact, last_message}]
let activeConv = null         // {id, phone_code, name}
let searchDebounce = null
let selectedLang = ""         // BCP-47 or "" for original
let availableChannels = []    // [{id, channel, display, external_code}]
let selectedChannel = null    // currently selected channel endpoint object
let lastEmailSubject = ""     // subject of the most recent email in active conv (for Re: pre-fill)
let convAiEnabled = null      // null | true | false — AI state from active session

// ─────────────────────────────────────────────
// DOM refs
// ─────────────────────────────────────────────
const btnConnect   = document.getElementById("btn-connect")
const statusDot    = document.getElementById("status-dot")
const statusText   = document.getElementById("status-text")
const convList     = document.getElementById("conv-list")
const panelRight   = document.getElementById("panel-right")
const inpSearch    = document.getElementById("inp-search")
const selStatus    = document.getElementById("sel-status")
const selLang      = document.getElementById("sel-lang")

// ─────────────────────────────────────────────
// Connect / disconnect
// ─────────────────────────────────────────────
btnConnect.addEventListener("click", () => {
  token = document.getElementById("inp-token").value.trim()
  propertyId = parseInt(document.getElementById("inp-property").value, 10)
  if (!token) return

  if (sio) { sio.disconnect(); sio = null }

  // Reset UI state for the new property
  activeConv = null
  conversations = []
  availableChannels = []
  selectedChannel = null
  convList.innerHTML = ""
  panelRight.innerHTML = '<div id="placeholder">Selecciona una conversación</div>'
  inpSearch.value = ""
  selStatus.value = ""

  sio = io(location.origin, {
    auth: { token, property_id: propertyId },
    transports: ["websocket"]
  })

  sio.on("connect", () => {
    statusDot.className = "connected"
    statusText.textContent = "Conectado"
    btnConnect.textContent = "Reconectar"
    loadInbox()
  })

  sio.on("connect_error", (err) => {
    statusDot.className = ""
    statusText.textContent = "Error: " + err.message
  })

  sio.on("disconnect", () => {
    statusDot.className = ""
    statusText.textContent = "Desconectado"
  })

  sio.on("conversation.created", (data) => {
    upsertConversation(data)
  })

  sio.on("conversation.updated", (data) => {
    upsertConversation(data)
  })

  sio.on("message.created", (data) => {
    if (activeConv && data.conversation_id === activeConv.id) {
      if (selectedLang) {
        reloadMessages()
      } else {
        appendMessage(data, "")
      }
      markConversationRead(activeConv.id)
    }
  })

  sio.on("escalation.created", (data) => {
    loadInbox()
    if (activeConv && data.conversation_id === activeConv.id) {
      openConversation({ id: activeConv.id, contact: { phone_code: activeConv.phone_code, display_name: activeConv.name } })
    }
  })

  sio.on("escalation.resolved", (data) => {
    loadInbox()
    if (activeConv && data.conversation_id === activeConv.id) {
      openConversation({ id: activeConv.id, contact: { phone_code: activeConv.phone_code, display_name: activeConv.name } })
    }
  })
})

// ─────────────────────────────────────────────
// API helpers
// ─────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  const res = await fetch(path, {
    ...opts,
    headers: {
      "Authorization": "Bearer " + token,
      "Content-Type": "application/json",
      ...(opts.headers || {})
    }
  })
  if (!res.ok) {
    let detail = res.status + " " + res.statusText
    try {
      const body = await res.json()
      if (body.detail) detail += "\n" + body.detail
    } catch {}
    throw new Error(detail)
  }
  if (res.status === 204) return null
  return res.json()
}

// ─────────────────────────────────────────────
// Inbox
// ─────────────────────────────────────────────
async function loadInbox() {
  const data = await apiFetch(`/api/v1/conversations/?property_id=${propertyId}`)
  conversations = data.conversations || []
  renderConvList()
}

async function runSearch() {
  const q = inpSearch.value.trim()
  const status = selStatus.value

  if (!q && !status) {
    return loadInbox()
  }

  let url = `/api/v1/conversations/search?property_id=${propertyId}`
  if (q) url += `&q=${encodeURIComponent(q)}`
  if (status) url += `&status=${status}`

  const data = await apiFetch(url)
  conversations = data.conversations || []
  renderConvList()
}

function renderConvList() {
  convList.innerHTML = ""
  if (conversations.length === 0) {
    convList.innerHTML = '<div style="padding:16px;color:#9ca3af;text-align:center">Sin resultados</div>'
    return
  }
  conversations.forEach(conv => {
    const el = buildConvItem(conv)
    convList.appendChild(el)
  })
}

function buildConvItem(conv) {
  const el = document.createElement("div")
  el.className = "conv-item" + (activeConv && activeConv.id === conv.id ? " active" : "")
  el.dataset.id = conv.id

  const name = conv.contact?.display_name || conv.contact?.phone_code || "—"
  const preview = conv.last_message?.content || ""
  const time = conv.last_message?.created_at ? relativeTime(conv.last_message.created_at) : ""
  const unread = conv.unread_count || 0
  const badge = unread > 0
    ? `<span style="background:#ef4444;color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700;flex-shrink:0">${unread}</span>`
    : ""

  // Channel indicators for last message
  const ch = conv.last_message?.channel
  const chIcon = ch === "email" ? " ✉" : ch === "whatsapp" ? " 📱" : ""
  const escBadge = conv.has_pending_escalation
    ? `<span style="background:#f59e0b;color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700;flex-shrink:0">ESCALADO</span>`
    : ""

  el.innerHTML = `
    <div class="conv-meta">
      <div class="conv-name">${esc(name)}</div>
      <div style="display:flex;align-items:center;gap:5px">${escBadge}${badge}<span class="conv-time">${esc(time)}</span></div>
    </div>
    <div class="conv-preview">${esc(chIcon + preview)}</div>
  `
  el.addEventListener("click", () => openConversation(conv))
  return el
}

function upsertConversation(data) {
  const idx = conversations.findIndex(c => c.id === data.id)
  const prev = idx >= 0 ? conversations[idx] : null
  // If this is the active conversation, don't bump unread count
  const isActive = activeConv && activeConv.id === data.id
  const updated = {
    id: data.id,
    created_at: data.created_at,
    updated_at: data.updated_at,
    contact: data.contact || (prev ? prev.contact : null),
    last_message: data.last_message || (prev ? prev.last_message : null),
    unread_count: isActive ? 0 : (data.unread_count ?? (prev ? prev.unread_count : 0))
  }
  if (idx >= 0) {
    conversations.splice(idx, 1)
  }
  conversations.unshift(updated)
  renderConvList()
}

// ─────────────────────────────────────────────
// Conversation view
// ─────────────────────────────────────────────
async function openConversation(conv) {
  // Leave previous chat room
  if (activeConv && sio) {
    sio.emit("leave_chat", { phone_code: activeConv.phone_code })
  }

  activeConv = {
    id: conv.id,
    phone_code: conv.contact?.phone_code,
    name: conv.contact?.display_name || conv.contact?.phone_code || "—"
  }
  convAiEnabled = conv.ai_enabled ?? null

  // Mark active in list
  document.querySelectorAll(".conv-item").forEach(el => {
    el.classList.toggle("active", parseInt(el.dataset.id) === conv.id)
  })

  // Build chat panel
  panelRight.innerHTML = `
    <div id="chat-header">
      <div>
        ${esc(activeConv.name)}
        <small>${esc(activeConv.phone_code || "")}</small>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <button id="btn-ai-toggle" class="btn-ai na" onclick="toggleAi()">IA: —</button>
        <button class="btn-transfer" onclick="openTransferModal()">↪ Transferir</button>
      </div>
    </div>
    <div id="messages"></div>
    <div id="composer">
      <div id="channel-bar"></div>
      <input id="inp-subject" type="text" placeholder="Asunto del email…">
      <div id="composer-row">
        <textarea id="inp-msg" placeholder="Escribe un mensaje…" rows="1"></textarea>
        <button id="btn-send">Enviar</button>
      </div>
    </div>
  `

  document.getElementById("btn-send").addEventListener("click", sendMessage)
  document.getElementById("inp-msg").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage() }
  })

  // Join socket room
  if (sio) sio.emit("join_chat", { phone_code: activeConv.phone_code })

  // Mark as read
  markConversationRead(conv.id)

  // Load messages, channels, and fresh inbox data in parallel
  const langParam = selectedLang ? `&language=${selectedLang}` : ""
  const [msgData, chData, inboxData, escData] = await Promise.all([
    apiFetch(`/api/v1/conversations/${conv.id}/messages?limit=100&property_id=${propertyId}${langParam}`),
    apiFetch(`/api/v1/conversations/${conv.id}/channels?property_id=${propertyId}`).catch(() => ({ channels: [] })),
    apiFetch(`/api/v1/conversations/?property_id=${propertyId}`).catch(() => ({ conversations: [] })),
    apiFetch(`/api/v1/conversations/${conv.id}/escalations`).catch(() => ({ escalations: [] })),
  ])

  // Refresh ai_enabled from fresh inbox data
  const freshConv = (inboxData.conversations || []).find(c => c.id === conv.id)
  if (freshConv) convAiEnabled = freshConv.ai_enabled ?? null

  // Render messages + escalations interleaved by timestamp
  const msgs = document.getElementById("messages")
  if (msgs) {
    // Merge messages and escalations into a single timeline
    const timeline = []
    ;(msgData.messages || []).forEach(m => timeline.push({ type: "message", data: m, ts: m.created_at }))
    ;(escData.escalations || []).forEach(e => timeline.push({ type: "escalation", data: e, ts: e.created_at }))
    timeline.sort((a, b) => new Date(a.ts) - new Date(b.ts))
    timeline.forEach(item => {
      if (item.type === "message") appendMessage(item.data, selectedLang)
      else appendEscalation(item.data)
    })
    msgs.scrollTop = msgs.scrollHeight
  }

  // Set up channel selector
  availableChannels = chData.channels || []
  selectedChannel = availableChannels[0] || null

  // Pre-fill Re: subject from last email message
  const allMsgs = msgData.messages || []
  const lastEmailMsg = allMsgs.filter(m => m.channel === "email").at(-1)
  if (lastEmailMsg?.email_metadata?.subject) {
    const sub = lastEmailMsg.email_metadata.subject
    lastEmailSubject = sub.toLowerCase().startsWith("re:") ? sub : "Re: " + sub
  } else {
    lastEmailSubject = ""
  }

  renderChannelBar()
  renderAiButton()
}

function renderAiButton() {
  const btn = document.getElementById("btn-ai-toggle")
  if (!btn) return
  if (convAiEnabled === null) {
    btn.className = "btn-ai na"
    btn.textContent = "IA: —"
  } else if (convAiEnabled) {
    btn.className = "btn-ai on"
    btn.textContent = "IA: ON"
  } else {
    btn.className = "btn-ai off"
    btn.textContent = "IA: OFF"
  }
}

async function toggleAi() {
  if (!activeConv || convAiEnabled === null) return
  const newState = !convAiEnabled
  const btn = document.getElementById("btn-ai-toggle")
  if (btn) btn.disabled = true
  try {
    const data = await apiFetch(
      `/api/v1/conversations/${activeConv.id}/ai?property_id=${propertyId}&ai_enabled=${newState}`,
      { method: "PATCH" }
    )
    convAiEnabled = data.ai_enabled
    renderAiButton()
  } catch (e) {
    alert("Error al cambiar IA: " + e.message)
  } finally {
    if (btn) btn.disabled = false
  }
}

function renderChannelBar() {
  const bar = document.getElementById("channel-bar")
  const subjectInp = document.getElementById("inp-subject")
  if (!bar) return

  if (availableChannels.length <= 1) {
    bar.style.display = "none"
    if (subjectInp) subjectInp.style.display = "none"
    return
  }

  bar.style.display = "flex"
  bar.innerHTML = availableChannels.map(ch => {
    const isActive = selectedChannel && selectedChannel.id === ch.id
    const icon = ch.channel === "email" ? "✉ " : "📱 "
    const label = ch.channel === "email"
      ? "Email"
      : (ch.display || "WhatsApp")
    const activeClass = isActive
      ? (ch.channel === "email" ? "active-email" : "active-wa")
      : ""
    return `<button class="channel-pill ${activeClass}" onclick="selectChannel(${ch.id})">${icon}${esc(label)}</button>`
  }).join("")

  // Show/hide subject input and pre-fill Re: subject
  if (subjectInp) {
    const isEmail = selectedChannel?.channel === "email"
    subjectInp.style.display = isEmail ? "block" : "none"
    if (isEmail && !subjectInp.value) {
      subjectInp.value = lastEmailSubject
    }
  }
}

function selectChannel(channelId) {
  selectedChannel = availableChannels.find(c => c.id === channelId) || null
  renderChannelBar()
}

function appendMessage(msg, requestedLang) {
  const msgs = document.getElementById("messages")
  if (!msgs) return

  const row = document.createElement("div")
  const isNote = msg.kind === "note"
  const isOutbound = msg.direction === "outbound"
  const isSystem = msg.sender === "system"
  const isEmail = msg.channel === "email"

  row.className = [
    "msg-row",
    isNote ? "note" : (isOutbound ? "outbound" : "inbound"),
    !isNote && isSystem ? "system" : "",
    !isNote && isEmail ? "email" : "",
  ].filter(Boolean).join(" ")

  const senderLabel = isNote ? "📋 Nota interna"
    : msg.sender === "agent"
      ? (msg.agent_display_name ? `Agente · ${msg.agent_display_name}` : "Agente")
      : msg.sender === "system" ? "Sistema"
      : "Huésped"

  const time = msg.created_at ? new Date(msg.created_at).toLocaleTimeString("es", { hour: "2-digit", minute: "2-digit" }) : ""

  // Channel badge
  const channelBadge = isEmail ? " · ✉ Email"
    : msg.channel === "whatsapp" ? " · 📱 WA"
    : ""

  // Translation state
  const needsTranslation = requestedLang && !msg.is_translated && msg.content_language !== requestedLang
  const contentHtml = needsTranslation
    ? `<span style="opacity:0.5;font-style:italic">Idioma no disponible</span>`
    : esc(msg.content || "")
  const translatedBadge = msg.is_translated
    ? `<span style="opacity:0.6;font-size:10px"> · 🌐 ${esc(msg.content_language)}</span>`
    : ""

  // Email subject line (shown for email messages when subject is present)
  const subjectHtml = isEmail && msg.email_metadata?.subject
    ? `<div class="email-subject">📌 ${esc(msg.email_metadata.subject)}</div>`
    : ""

  // Media attachments
  let mediaHtml = ""
  if (msg.media && msg.media.length > 0) {
    for (const ma of msg.media) {
      if (ma.media_type === "image" && ma.url) {
        mediaHtml += `<div class="media-block"><img src="${esc(ma.url)}" alt="image" style="max-width:100%;border-radius:8px;margin-bottom:4px;cursor:pointer" onclick="window.open('${esc(ma.url)}','_blank')"></div>`
        if (ma.vision_description) {
          mediaHtml += `<div class="media-ai-tag">🔍 ${esc(ma.vision_description)}</div>`
        }
      } else if (ma.media_type === "audio" && ma.url) {
        mediaHtml += `<div class="media-block"><audio controls src="${esc(ma.url)}" style="max-width:100%"></audio></div>`
        if (ma.transcription) {
          mediaHtml += `<div class="media-ai-tag">🎙 ${esc(ma.transcription)}</div>`
        }
      } else if (ma.media_type === "video" && ma.url) {
        mediaHtml += `<div class="media-block"><video controls src="${esc(ma.url)}" style="max-width:100%;border-radius:8px"></video></div>`
      } else if (ma.url) {
        const fname = ma.filename || "documento"
        mediaHtml += `<div class="media-block"><a href="${esc(ma.url)}" target="_blank" style="color:inherit;text-decoration:underline">📎 ${esc(fname)}</a></div>`
      }
    }
  }

  row.innerHTML = `
    <div class="bubble">
      ${subjectHtml}
      ${mediaHtml}
      ${contentHtml}
      <div class="bubble-meta">${esc(senderLabel)}${channelBadge} · ${esc(time)}${translatedBadge}</div>
    </div>
  `
  msgs.appendChild(row)
  msgs.scrollTop = msgs.scrollHeight
}

function appendEscalation(escObj) {
  const msgs = document.getElementById("messages")
  if (!msgs) return
  const block = document.createElement("div")
  block.className = "escalation-block" + (escObj.status === "resolved" ? " resolved" : "")
  block.id = "esc-" + escObj.id

  const typeLabel = {
    "manual": "Escalado manual",
    "info_not_found": "Info no disponible",
    "bad_response": "Respuesta rechazada",
    "inappropriate": "Contenido inapropiado",
  }[escObj.escalation_type] || escObj.escalation_type

  const statusLabel = escObj.status === "pending"
    ? '<span class="escalation-status pending">Pendiente</span>'
    : '<span class="escalation-status resolved">Resuelto</span>'

  const time = escObj.created_at ? new Date(escObj.created_at).toLocaleString("es", {day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}) : ""

  let msgsHtml = ""
  if (escObj.messages && escObj.messages.length > 0) {
    msgsHtml = '<div class="escalation-messages">'
    for (const m of escObj.messages) {
      const sender = m.sender === "guest" ? "Huésped" : m.sender === "agent" ? "Operador" : "Sistema"
      msgsHtml += `<div class="escalation-msg"><b>${esc(sender)}:</b> ${esc(m.content || "")}</div>`
    }
    msgsHtml += '</div>'
  }

  const resolveBtn = escObj.status === "pending"
    ? `<button class="btn-resolve" onclick="resolveEscalation(${escObj.id})">Resolver</button>`
    : ""

  const resolutionInfo = escObj.status === "resolved" && escObj.resolution_medium
    ? `<div style="font-size:11px;color:#166534;margin-top:4px">Resuelto via ${esc(escObj.resolution_medium || "")}${escObj.resolution_notes ? ": " + esc(escObj.resolution_notes) : ""}</div>`
    : ""

  block.innerHTML = `
    <div class="escalation-header">
      <span class="escalation-type">${typeLabel} · ${time}</span>
      <div style="display:flex;gap:6px;align-items:center">${statusLabel} ${resolveBtn}</div>
    </div>
    <div class="escalation-reason">${esc(escObj.reason || "")}</div>
    ${msgsHtml}
    ${resolutionInfo}
  `
  msgs.appendChild(block)
}

async function resolveEscalation(escalationId) {
  try {
    await apiFetch(`/api/v1/escalations/${escalationId}/resolve`, {
      method: "PATCH",
      body: JSON.stringify({ resolution_medium: "ai_supervised", resolution_notes: "Resolved from dev UI" })
    })
    // Refresh the conversation
    if (activeConv) openConversation({ id: activeConv.id, contact: { phone_code: activeConv.phone_code, display_name: activeConv.name } })
    loadInbox()
  } catch (e) {
    alert("Error al resolver: " + e.message)
  }
}

async function reloadMessages() {
  const msgs = document.getElementById("messages")
  if (!msgs || !activeConv) return
  const langParam = selectedLang ? `&language=${selectedLang}` : ""
  const data = await apiFetch(`/api/v1/conversations/${activeConv.id}/messages?limit=100&property_id=${propertyId}${langParam}`)
  msgs.innerHTML = ""
  ;(data.messages || []).forEach(m => appendMessage(m, selectedLang))
  msgs.scrollTop = msgs.scrollHeight
}

async function sendMessage() {
  const inp = document.getElementById("inp-msg")
  if (!inp || !activeConv) return
  const content = inp.value.trim()
  if (!content) return

  const btn = document.getElementById("btn-send")
  btn.disabled = true

  try {
    if (selectedChannel?.channel === "email") {
      const subjectInp = document.getElementById("inp-subject")
      const subject = subjectInp?.value?.trim() || "(sin asunto)"
      await apiFetch("/api/v1/email/send", {
        method: "POST",
        body: JSON.stringify({
          conversation_id: activeConv.id,
          channel_endpoint_id: selectedChannel.id,
          subject,
          text_body: content,
          agent_user_id: 1,
          agent_display_name: "Dev User",
        })
      })
      if (subjectInp) subjectInp.value = ""
    } else {
      await apiFetch("/api/v1/chatter/send-message", {
        method: "POST",
        body: JSON.stringify({
          conversation_id: activeConv.id,
          content,
          agent_user_id: 1,
          agent_display_name: "Dev User"
        })
      })
    }
    inp.value = ""
  } catch (e) {
    alert("Error al enviar: " + e.message)
  } finally {
    btn.disabled = false
    inp.focus()
  }
}

// ─────────────────────────────────────────────
// Mark read
// ─────────────────────────────────────────────
function markConversationRead(convId) {
  apiFetch(`/api/v1/conversations/${convId}/read?property_id=${propertyId}`, { method: "PATCH" })
    .then(() => {
      const idx = conversations.findIndex(c => c.id === convId)
      if (idx >= 0 && conversations[idx].unread_count !== 0) {
        conversations[idx].unread_count = 0
        renderConvList()
      }
    })
    .catch(() => {}) // fire-and-forget
}

// ─────────────────────────────────────────────
// Language selector
// ─────────────────────────────────────────────
selLang.addEventListener("change", () => {
  selectedLang = selLang.value
  if (activeConv) openConversation({ id: activeConv.id, contact: { phone_code: activeConv.phone_code, display_name: activeConv.name } })
})

// ─────────────────────────────────────────────
// Transfer
// ─────────────────────────────────────────────
async function openTransferModal() {
  if (!activeConv) return
  const modal = document.getElementById("transfer-modal")
  const sel = document.getElementById("sel-transfer-prop")
  sel.innerHTML = "<option disabled selected>Cargando…</option>"
  document.getElementById("inp-transfer-note").value = ""
  modal.style.display = ""
  try {
    const data = await apiFetch(`/api/v1/conversations/${activeConv.id}/transfer-targets`)
    sel.innerHTML = ""
    ;(data.properties || []).forEach(p => {
      const opt = document.createElement("option")
      opt.value = p.id
      opt.textContent = p.name
      sel.appendChild(opt)
    })
    if (!sel.options.length) {
      sel.innerHTML = "<option disabled>No hay destinos disponibles</option>"
    }
  } catch(e) {
    sel.innerHTML = "<option disabled>Error al cargar propiedades</option>"
  }
}

function closeTransferModal() {
  document.getElementById("transfer-modal").style.display = "none"
}

async function doTransfer() {
  const propId = parseInt(document.getElementById("sel-transfer-prop").value)
  const note = document.getElementById("inp-transfer-note").value.trim()
  if (!propId || isNaN(propId)) { alert("Selecciona un hotel destino."); return }
  if (!note) { alert("Escribe una nota para el destino."); return }
  const btn = document.getElementById("btn-transfer-confirm")
  btn.disabled = true
  try {
    await apiFetch(`/api/v1/conversations/${activeConv.id}/transfer`, {
      method: "POST",
      body: JSON.stringify({ destination_property_id: propId, note })
    })
    closeTransferModal()
    await reloadMessages()
  } catch(e) {
    alert("Error al transferir: " + e.message)
  } finally {
    btn.disabled = false
  }
}

// ─────────────────────────────────────────────
// Search with debounce
// ─────────────────────────────────────────────
inpSearch.addEventListener("input", () => {
  clearTimeout(searchDebounce)
  searchDebounce = setTimeout(runSearch, 300)
})
selStatus.addEventListener("change", runSearch)

// ─────────────────────────────────────────────
// Utilities
// ─────────────────────────────────────────────
function esc(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
}

function relativeTime(iso) {
  const diff = Date.now() - new Date(iso).getTime()
  const m = Math.floor(diff / 60000)
  if (m < 1) return "ahora"
  if (m < 60) return `${m}m`
  const h = Math.floor(m / 60)
  if (h < 24) return `${h}h`
  return `${Math.floor(h / 24)}d`
}
