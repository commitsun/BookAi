[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "roomdoo-sdk"
version = "0.1.0"
description = "Python SDK for accessing Odoo/Roomdoo via JSON-RPC"
requires-python = ">=3.10"
dependencies = [
    "aiohttp>=3.9",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
]
