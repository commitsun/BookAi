services:
  postgres:
    image: postgres:16
    container_name: bookai-postgres
    environment:
      POSTGRES_USER: bookai
      POSTGRES_PASSWORD: bookai
      POSTGRES_DB: bookai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookai"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: bookai
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "devel.odoo:172.24.0.14"
    command: ["--reload"]
    restart: unless-stopped

volumes:
  postgres_data:
