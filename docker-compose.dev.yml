services:
  db:
    image: postgres:16-alpine
    container_name: bookai-db
    environment:
      POSTGRES_USER: bookai
      POSTGRES_PASSWORD: bookai
      POSTGRES_DB: bookai
    ports:
      - "5432:5432"
    volumes:
      - bookai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bookai_pgdata:
