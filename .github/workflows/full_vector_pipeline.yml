name: "🔄 Full S3 → Supabase Vectorization"

on:
  workflow_dispatch:
    inputs:
      full_refresh:
        description: "Limpiar tablas y revectorizar todo (true/false)"
        required: false
        default: "false"
  push:
    branches:
      - vectorizer-pipeline
  schedule:
    - cron: "0 3 * * *"

permissions:
  id-token: write
  contents: read

jobs:
  sync-s3:
    name: "🧩 1️⃣ Sync S3"
    runs-on: ubuntu-latest
    steps:
      - name: "🛎️ Checkout repository"
        uses: actions/checkout@v4
        with:
          ref: vectorizer-pipeline
      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: "📦 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: "🔐 Configure AWS credentials (OIDC)"
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::958933161814:role/github-oidc-s3-access
          aws-region: eu-west-1
      - name: "🌍 Load environment variables"
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> $GITHUB_ENV
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> $GITHUB_ENV
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> $GITHUB_ENV
          echo "S3_BUCKET=bookai-pre-roomdoo" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=eu-west-1" >> $GITHUB_ENV
          echo "FULL_REFRESH=${{ github.event.inputs.full_refresh }}" >> $GITHUB_ENV
      - name: "🚀 Step 1: Sync with S3"
        run: python -m pipeline.s3_client

  vectorize:
    name: "🧠 2️⃣ Vectorize in Supabase"
    needs: [sync-s3]
    runs-on: ubuntu-latest
    steps:
      - name: "🛎️ Checkout repository"
        uses: actions/checkout@v4
        with:
          ref: vectorizer-pipeline
      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: "📦 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: "🔐 Configure AWS credentials (OIDC)"
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::958933161814:role/github-oidc-s3-access
          aws-region: eu-west-1
      - name: "🌍 Load environment variables"
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> $GITHUB_ENV
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> $GITHUB_ENV
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> $GITHUB_ENV
          echo "S3_BUCKET=bookai-pre-roomdoo" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=eu-west-1" >> $GITHUB_ENV
          echo "FULL_REFRESH=${{ github.event.inputs.full_refresh }}" >> $GITHUB_ENV
      - name: "🚀 Step 2: Run full vectorization pipeline"
        run: python -m pipeline.run_pipeline
